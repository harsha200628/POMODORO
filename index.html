<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gamified Focus Engine</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; background: #020817; color: #f8fafc; font-family: 'Inter', sans-serif; }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(129,140,248,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(129,140,248,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridScroll 20s linear infinite;
    }
    @keyframes gridScroll { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

    .orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
    .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(139,92,246,0.25), transparent 70%); top: -200px; left: -150px; animation: drift1 12s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(236,72,153,0.15), transparent 70%); bottom: -150px; right: -100px; animation: drift2 15s ease-in-out infinite alternate; }
    .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(14,165,233,0.12), transparent 70%); top: 40%; left: 55%; animation: drift3 10s ease-in-out infinite alternate; }
    @keyframes drift1 { to { transform: translate(60px, 80px); } }
    @keyframes drift2 { to { transform: translate(-40px, -60px); } }
    @keyframes drift3 { to { transform: translate(-50px, 40px); } }

    .scanlines { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px); }

    .stage {
      position: relative; z-index: 2;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      gap: 0;
    }

    .chip {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.45rem 1.2rem;
      background: rgba(129,140,248,0.1);
      border: 1px solid rgba(129,140,248,0.25);
      border-radius: 9999px;
      font-size: 0.8rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: #a5b4fc;
      animation: fadeUp 0.6s ease both;
      margin-bottom: 2rem;
    }
    .chip-dot { width: 6px; height: 6px; border-radius: 50%; background: #818cf8; box-shadow: 0 0 8px #818cf8; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .headline {
      font-size: clamp(2.5rem, 10vw, 7rem);
      font-weight: 800; line-height: 1.1; letter-spacing: -0.03em;
      animation: fadeUp 0.7s 0.1s ease both;
      margin-bottom: 1.5rem;
    }
    .line-1 { display: block; color: #f8fafc; }
    .line-2 { display: block; background: linear-gradient(135deg, #c084fc 0%, #818cf8 45%, #38bdf8 100%); background-clip: text; -webkit-background-clip: text; color: transparent; }

    .sub {
      max-width: 540px; font-size: clamp(0.95rem, 3vw, 1.15rem);
      color: #94a3b8; line-height: 1.7;
      animation: fadeUp 0.7s 0.2s ease both;
      margin-bottom: 2.5rem;
      padding: 0 1rem;
    }

    .btn-launch {
      padding: 1rem 2.5rem;
      font-size: 1.1rem; font-weight: 700;
      border: none; border-radius: 9999px; cursor: pointer;
      background: linear-gradient(135deg, #c084fc, #818cf8, #60a5fa);
      background-size: 200% 200%;
      color: #fff;
      box-shadow: 0 8px 32px rgba(129,140,248,0.5), 0 1px 0 rgba(255,255,255,0.2) inset;
      transition: all 0.3s ease;
      font-family: inherit; letter-spacing: 0.02em;
      animation: fadeUp 0.7s 0.3s ease both, gradientShift 4s ease infinite;
      width: min(100%, 300px);
    }
    .btn-launch:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(129,140,248,0.65), 0 1px 0 rgba(255,255,255,0.25) inset; }
    .btn-launch:active { transform: scale(0.97); }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }

    body.leaving { animation: exitFade 0.5s ease forwards; }
    @keyframes exitFade { to { opacity: 0; transform: scale(1.03); filter: blur(6px); } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="scanlines"></div>

  <main class="stage">
    <div class="chip"><span class="chip-dot"></span> Productivity × Gaming</div>

    <h1 class="headline">
      <span class="line-1">Focus Harder.</span>
      <span class="line-2">Earn More.</span>
    </h1>

    <p class="sub">
      A zero-dependency productivity engine built for the distracted generation.
      Complete Pomodoro sessions, harvest XP, and upgrade your ship in a full Space Defender simulation.
    </p>

    <button class="btn-launch" onclick="launch('dashboard.html')">Get Started →</button>
  </main>

  <script>
    function launch(url) {
      document.body.classList.add('leaving');
      setTimeout(() => { window.location.href = url; }, 480);
    }
  </script>
</body>
</html>
